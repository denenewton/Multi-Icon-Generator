name: Build Multiplatform App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      if: runner.os != 'Windows'
      run: chmod +x gradlew

    # Build para Desktop (conforme o SO)
    - name: Package Desktop App
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./gradlew :composeApp:packageMsi
        elif [ "$RUNNER_OS" == "macOS" ]; then
          ./gradlew :composeApp:packageDmg
        else
          ./gradlew :composeApp:packageDeb
        fi
      shell: bash

    # Upload dos artefatos Desktop
    - name: Upload Desktop Artifact
      uses: actions/upload-artifact@v4
      with:
        name: multi-icon-generator-${{ matrix.os }}
        path: |
          composeApp/build/compose/binaries/main/dmg/*.dmg
          composeApp/build/compose/binaries/main/msi/*.msi
          composeApp/build/compose/binaries/main/deb/*.deb

  # Job separado para Android (roda no Ubuntu por ser mais rápido)
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Android APK
      run: ./gradlew :composeApp:assembleRelease
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: multi-icon-generator-android
        path: composeApp/build/outputs/apk/release/*.apk
